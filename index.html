let activeType='all',activeRegion='all',activeExp='all',searchQuery='',viewMode='card';
const cardsContainer=document.getElementById('cardsContainer');
const tableView=document.getElementById('tableView');
const tableBody=document.getElementById('tableBody');
const emptyState=document.getElementById('emptyState');
function filterData(){let data=incomeData;if(activeType!=='all')data=data.filter(d=>d.type===activeType);if(activeRegion!=='all')data=data.filter(d=>d.region===activeRegion);if(activeExp!=='all')data=data.filter(d=>d.exp===activeExp);if(searchQuery){const q=searchQuery.toLowerCase();data=data.filter(d=>d.name.toLowerCase().includes(q)||d.role.toLowerCase().includes(q)||d.company.toLowerCase().includes(q)||d.type.toLowerCase().includes(q)||d.income.toLowerCase().includes(q))}return data}
function renderCards(){const data=filterData();if(data.length===0){cardsContainer.style.display='none';tableView.style.display='none';emptyState.style.display='block';return}emptyState.style.display='none';if(viewMode==='card'){cardsContainer.style.display='grid';tableView.style.display='none';cardsContainer.innerHTML=data.map(d=>`
<div class="income-card" onclick="openModal(${d.id})">
<div class="card-header">
<div class="card-name">${d.name}</div>
<div class="card-income">${d.income}</div>
</div>
<div class="card-meta">
<span class="tag tag-type">${d.type}</span>
<span class="tag tag-region">${d.region}</span>
<span class="tag tag-exp">${d.exp}</span>
</div>
<div class="card-role">${d.role} · ${d.company}</div>
<div class="card-story">${d.summary}</div>
</div>`).join('')}else{cardsContainer.style.display='none';tableView.style.display='block';tableBody.innerHTML=data.map(d=>`
<tr onclick="openModal(${d.id})">
<td><strong>${d.name}</strong></td>
<td>${d.role}</td>
<td><span class="tag tag-type">${d.type}</span></td>
<td class="td-income">${d.income}</td>
<td>${d.region}</td>
<td>${d.exp}</td>
</tr>`).join('')}}
function openModal(id){const d=incomeData.find(x=>x.id===id);if(!d)return;const numHtml=d.numbers?Object.entries(d.numbers).map(([k,v])=>`<div class="key-number-item"><div class="num">${v}</div><div class="label">${k}</div></div>`).join(''):'';document.getElementById('modalBody').innerHTML=`
<div class="modal-title">${d.name}</div>
<div class="modal-income">${d.income}</div>
<div class="modal-tags">
<span class="tag tag-type">${d.type}</span>
<span class="tag tag-region">${d.region}</span>
<span class="tag tag-exp">${d.exp}</span>
</div>
<div class="modal-section"><h3>角色 / 公司</h3><p>${d.role} · ${d.company}</p></div>
<div class="modal-section"><h3>案例概述</h3><p>${d.summary}</p></div>
<div class="modal-section"><h3>关键数字</h3><div class="key-numbers">${numHtml}</div></div>
<div class="modal-section"><h3>核心洞察</h3><p>${d.insight}</p></div>
<div class="modal-section"><h3>信息来源</h3><a href="${d.source}" target="_blank" class="source-link">查看来源 →</a></div>
`;document.getElementById('detailModal').classList.add('active')}
function closeModal(){document.getElementById('detailModal').classList.remove('active')}
document.getElementById('detailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderCards()});
document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{const group=btn.dataset.group;const filter=btn.dataset.filter;document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(group==='type')activeType=filter;else if(group==='region')activeRegion=filter;else if(group==='exp')activeExp=filter;renderCards()})});
document.getElementById('cardViewBtn').addEventListener('click',()=>{viewMode='card';document.getElementById('cardViewBtn').classList.add('active');document.getElementById('tableViewBtn').classList.remove('active');renderCards()});
document.getElementById('tableViewBtn').addEventListener('click',()=>{viewMode='table';document.getElementById('tableViewBtn').classList.add('active');document.getElementById('cardViewBtn').classList.remove('active');renderCards()});
renderCards();
</script>
</body>
</html>
